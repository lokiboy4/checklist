<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="main-page" class="panel app-page" hidden>
        <div class="page-heading">
          <img class="main-logo" src="logo.png" alt="Logo" />
        </div>
        <div class="menu-grid">
          <button id="menu-prep" class="menu-button" type="button">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M7 3h2v7c0 1.2-.8 2.2-2 2.5V21H5v-8.5C3.8 12.2 3 11.2 3 10V3h2v7h2V3zm11.5 0c1.4 0 2.5 1.1 2.5 2.5V21h-2v-6h-3V5.5C16 4.1 17.1 3 18.5 3z" />
              </svg>
            </span>
            <span class="menu-label">Prep checklist</span>
          </button>
          <button id="menu-fridge" class="menu-button ghost" type="button">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v6h10V4H7zm0 8v8h10v-8H7zm7 2h2v4h-2v-4z" />
              </svg>
            </span>
            <span class="menu-label">My Fridge</span>
          </button>
          <button id="menu-order" class="menu-button ghost" type="button">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M3 5h6l2 2h10v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5zm2 2v12h14V9h-8.8l-2-2H5z" />
              </svg>
            </span>
            <span class="menu-label">Order</span>
          </button>
          <button id="menu-factsheet" class="menu-button ghost" type="button">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm8 2H6v15h12V9h-4a1 1 0 0 1-1-1V5zm-6 7h8v2H8v-2zm0 4h8v2H8v-2z" />
              </svg>
            </span>
            <span class="menu-label">Fact sheet</span>
          </button>
        </div>
      </section>

      <section id="checklist-page" class="panel app-page">
        <form id="task-form" class="task-form" autocomplete="off">
          <label for="task-input" class="sr-only">New task</label>
          <input id="task-input" name="task" type="text" maxlength="120" placeholder="Add a task and press Enter" required />
          <label for="section-input" class="sr-only">Section</label>
          <input id="section-input" name="section" type="text" maxlength="60" placeholder="Section" />
          <label for="section-picker" class="sr-only">Existing sections</label>
          <select id="section-picker" aria-label="Existing sections"></select>
          <button type="submit">Add</button>
        </form>

        <div class="toolbar">
          <button id="main-menu-button" class="ghost" type="button">Main menu</button>
          <label for="toolbar-section-selector" class="sr-only">Section filter</label>
          <select id="toolbar-section-selector" class="toolbar-section-selector" aria-label="Section filter"></select>
        </div>

        <ul id="task-list" class="task-list" aria-live="polite"></ul>

        <footer class="status">
          <span id="count">0 tasks left</span>
          <span id="sync-status">Local only</span>
        </footer>
      </section>

      <section id="fridge-page" class="panel app-page" hidden>
        <div class="page-heading">
          <h1 class="fridge-page-title">My Fridge</h1>
        </div>
        <form id="fridge-form" class="task-form" autocomplete="off">
          <label for="fridge-input" class="sr-only">New fridge item</label>
          <input id="fridge-input" name="fridge-item" type="text" maxlength="120" placeholder="Add a fridge item" required />
          <label for="fridge-section-input" class="sr-only">Fridge section</label>
          <input id="fridge-section-input" name="fridge-section" type="text" maxlength="60" placeholder="Section" />
          <label for="fridge-section-picker" class="sr-only">Existing fridge sections</label>
          <select id="fridge-section-picker" aria-label="Existing fridge sections"></select>
          <button type="submit">Add</button>
        </form>
        <div class="page-actions">
          <button id="fridge-back" class="ghost" type="button">Back to main page</button>
        </div>
        <ul id="fridge-list" class="fridge-list" aria-live="polite"></ul>
      </section>

      <section id="order-page" class="panel app-page" hidden>
        <div class="page-heading">
          <h1>Order</h1>
        </div>
        <form id="order-form" class="task-form" autocomplete="off">
          <label for="order-input" class="sr-only">New order item</label>
          <input id="order-input" name="order-item" type="text" maxlength="120" placeholder="Add an order item" required />
          <label for="order-section-input" class="sr-only">Order section</label>
          <input id="order-section-input" name="order-section" type="text" maxlength="60" placeholder="Section" />
          <label for="order-section-picker" class="sr-only">Existing order sections</label>
          <select id="order-section-picker" aria-label="Existing order sections"></select>
          <button type="submit">Add</button>
        </form>
        <div class="page-actions">
          <button id="order-back" class="ghost" type="button">Back to main page</button>
        </div>
        <ul id="order-list" class="order-list" aria-live="polite"></ul>
      </section>

      <section id="factsheet-page" class="panel app-page" hidden>
        <div class="page-heading">
          <h1>Fact sheet</h1>
        </div>
        <form id="factsheet-form" class="factsheet-form" autocomplete="off">
          <label for="factsheet-name" class="sr-only">Menu name</label>
          <input id="factsheet-name" name="factsheet-name" type="text" maxlength="120" placeholder="Menu name" required />
          <label for="factsheet-ingredients" class="sr-only">Ingredients</label>
          <textarea id="factsheet-ingredients" name="factsheet-ingredients" rows="3" maxlength="500" placeholder="Ingredients"></textarea>
          <div class="factsheet-dietary-picker" id="factsheet-dietary-picker">
            <label><input type="checkbox" value="Vegetarian" /> Vegetarian</label>
            <label><input type="checkbox" value="Vegan" /> Vegan</label>
            <label><input type="checkbox" value="Nut" /> Nut</label>
            <label><input type="checkbox" value="Onion" /> Onion</label>
            <label><input type="checkbox" value="Coriander" /> Coriander</label>
            <label><input type="checkbox" value="GF" /> GF</label>
            <label><input type="checkbox" value="GFO" /> GFO</label>
          </div>
          <button type="submit">Add</button>
        </form>
        <div class="toolbar factsheet-toolbar">
          <input id="factsheet-filter-ingredient" type="text" placeholder="Filter by ingredient" aria-label="Filter by ingredient" />
          <div class="factsheet-filter-tags" id="factsheet-filter-tags">
            <button class="factsheet-tag-filter" type="button" data-tag="Vegetarian">Vegetarian</button>
            <button class="factsheet-tag-filter" type="button" data-tag="Vegan">Vegan</button>
            <button class="factsheet-tag-filter" type="button" data-tag="Nut">Nut</button>
            <button class="factsheet-tag-filter" type="button" data-tag="Onion">Onion</button>
            <button class="factsheet-tag-filter" type="button" data-tag="Coriander">Coriander</button>
            <button class="factsheet-tag-filter" type="button" data-tag="GF">GF</button>
            <button class="factsheet-tag-filter" type="button" data-tag="GFO">GFO</button>
          </div>
        </div>
        <div class="page-actions">
          <button id="factsheet-back" class="ghost" type="button">Back to main page</button>
        </div>
        <ul id="factsheet-list" class="factsheet-list" aria-live="polite"></ul>
      </section>
    </main>

    <template id="task-template">
      <li class="task-item">
        <label>
          <input type="checkbox" />
          <span class="task-text"></span>
        </label>
        <div class="stock-editor">
          <label class="sr-only">Task value</label>
          <select class="stock-input task-value-input" aria-label="Task value"></select>
        </div>
        <select class="row-color" aria-label="Row color">
          <option value="default">Default</option>
          <option value="red">Red</option>
          <option value="yellow">Yellow</option>
          <option value="blue">Blue</option>
          <option value="green">Green</option>
        </select>
        <div class="task-actions">
          <button class="detail" type="button" aria-label="View details">i</button>
          <button class="edit" type="button" aria-label="Edit task">✎</button>
        </div>
      </li>
    </template>

    <template id="fridge-item-template">
      <li class="fridge-item">
        <div class="fridge-item-top">
          <button class="fridge-task-text fridge-task-button" type="button"></button>
          <div class="fridge-inline-values">
            <select class="stock-input fridge-value-input" aria-label="Fridge value"></select>
          </div>
        </div>
      </li>
    </template>

    <template id="order-item-template">
      <li class="order-item">
        <button class="order-item-button" type="button"></button>
        <select class="stock-input order-value-input" aria-label="Order value"></select>
      </li>
    </template>

    <template id="factsheet-item-template">
      <li class="factsheet-item">
        <div class="factsheet-item-head">
          <button class="factsheet-name-button" type="button"></button>
          <button class="factsheet-detail-button" type="button">Detail</button>
        </div>
        <p class="factsheet-ingredients"></p>
        <div class="factsheet-tags"></div>
      </li>
    </template>

    <template id="section-header-template">
      <li class="section-header section-header-editable">
        <button class="section-title-button" type="button"></button>
      </li>
    </template>

    <template id="fridge-section-header-template">
      <li class="section-header section-header-editable fridge-section-header">
        <button class="section-title-button" type="button"></button>
        <button class="pickup-button" type="button">Pick up</button>
      </li>
    </template>

    <template id="order-section-header-template">
      <li class="section-header section-header-editable fridge-section-header">
        <button class="section-title-button" type="button"></button>
        <button class="pickup-button" type="button">Pick up</button>
      </li>
    </template>

    <dialog id="detail-modal" class="detail-modal">
      <form method="dialog" class="detail-modal-content">
        <h2 id="detail-title">Item detail</h2>
        <p class="detail-help">Prep detail / recipe</p>
        <div class="detail-photo">
          <div id="detail-photo-preview" class="detail-photo-preview" hidden></div>
          <label id="detail-photo-button" class="photo-button" for="detail-photo-input">Photo</label>
          <input id="detail-photo-input" type="file" accept="image/*" multiple hidden />
        </div>
        <textarea id="detail-text" rows="7" placeholder="Add prep steps or recipe..." disabled></textarea>
        <div class="detail-actions">
          <button id="detail-edit" type="button">Edit</button>
          <button id="detail-cancel" class="ghost" value="cancel">Cancel</button>
          <button id="detail-save" value="default">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="edit-modal" class="edit-modal">
      <form method="dialog" class="edit-modal-content">
        <h2 id="edit-title">Edit item</h2>
        <div class="edit-actions">
          <button id="edit-rename" type="button">Rename</button>
          <button id="edit-remove" class="danger" type="button">Remove</button>
        </div>
        <div class="detail-actions">
          <button class="ghost" value="cancel">Close</button>
        </div>
      </form>
    </dialog>

    <dialog id="pickup-modal" class="edit-modal">
      <form method="dialog" class="edit-modal-content">
        <h2 id="pickup-title">Pick up list</h2>
        <ul id="pickup-list" class="pickup-list"></ul>
        <div class="detail-actions">
          <button id="pickup-copy" type="button">Copy list</button>
          <button class="ghost" value="cancel">Close</button>
        </div>
      </form>
    </dialog>

    <dialog id="factsheet-detail-modal" class="detail-modal">
      <form method="dialog" class="detail-modal-content">
        <h2 id="factsheet-detail-title">Fact sheet detail</h2>
        <textarea id="factsheet-detail-text" rows="7" placeholder="Add notes or detail..."></textarea>
        <div class="detail-actions">
          <button id="factsheet-detail-save" type="button">Save</button>
          <button class="ghost" value="cancel">Close</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="app.js"></script>
  </body>
</html>
